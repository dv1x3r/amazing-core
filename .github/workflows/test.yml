name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test NOCGO
        run: CGO_ENABLED=0 go test -v ./...

      - name: Test CGO
        run: CGO_ENABLED=1 go test -v -race ./...

      - name: Vet
        run: go vet ./...
